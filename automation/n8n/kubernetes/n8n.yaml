apiVersion: v1
kind: Namespace
metadata:
  name: n8n
---
apiVersion: v1
data:
  init-data.sh: "#!/bin/bash\nset -e;\nif [ -n \"${POSTGRES_NON_ROOT_USER:-}\" ] &&
    [ -n \"${POSTGRES_NON_ROOT_PASSWORD:-}\" ]; then\n\tpsql -v ON_ERROR_STOP=1 --username
    \"$POSTGRES_USER\" --dbname \"$POSTGRES_DB\" <<-EOSQL\n\t\tCREATE USER \"${POSTGRES_NON_ROOT_USER}\"
    WITH PASSWORD '${POSTGRES_NON_ROOT_PASSWORD}';\n\t\tGRANT ALL PRIVILEGES ON DATABASE
    ${POSTGRES_DB} TO \"${POSTGRES_NON_ROOT_USER}\";\n\tEOSQL\nelse\n\techo \"SETUP
    INFO: No Environment variables given!\"\nfi"
kind: ConfigMap
metadata:
  name: init-data
  namespace: n8n
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: n8n
stringData:
  POSTGRES_DB: n8n
  POSTGRES_NON_ROOT_PASSWORD: changePassword
  POSTGRES_NON_ROOT_USER: changeUser
  POSTGRES_PASSWORD: changePassword
  POSTGRES_USER: changeUser
type: Opaque
---
apiVersion: v1
kind: Service
metadata:
  labels:
    service: n8n
  name: n8n
  namespace: n8n
spec:
  ports:
  - name: "80-5678"
    port: 80
    protocol: TCP
    targetPort: 5678
  selector:
    service: n8n
  type: LoadBalancer
---
apiVersion: v1
kind: Service
metadata:
  labels:
    service: postgres-n8n
  name: postgres-service
  namespace: n8n
spec:
  clusterIP: None
  ports:
  - name: "5432"
    port: 5432
    protocol: TCP
    targetPort: 5432
  selector:
    service: postgres-n8n
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  labels:
    service: n8n-claim0
  name: n8n-claim0
  namespace: n8n
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgresql-pv
  namespace: n8n
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 300Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    service: n8n
  name: n8n
  namespace: n8n
spec:
  replicas: 1
  selector:
    matchLabels:
      service: n8n
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        service: n8n
    spec:
      containers:
      - args:
        - -c
        - sleep 5; n8n start
        command:
        - /bin/sh
        env:
        - name: DB_TYPE
          value: postgresdb
        - name: DB_POSTGRESDB_HOST
          value: postgres-service.n8n.svc.cluster.local
        - name: DB_POSTGRESDB_PORT
          value: "5432"
        - name: DB_POSTGRESDB_DATABASE
          value: n8n
        - name: DB_POSTGRESDB_USER
          valueFrom:
            secretKeyRef:
              key: POSTGRES_NON_ROOT_USER
              name: postgres-secret
        - name: DB_POSTGRESDB_PASSWORD
          valueFrom:
            secretKeyRef:
              key: POSTGRES_NON_ROOT_PASSWORD
              name: postgres-secret
        - name: N8N_PROTOCOL
          value: http
        - name: N8N_PORT
          value: "5678"
        - name: N8N_SECURE_COOKIE
          value: "false"
        image: n8nio/n8n
        name: n8n
        ports:
        - containerPort: 5678
        resources:
          limits:
            memory: 500Mi
          requests:
            memory: 250Mi
        volumeMounts:
        - mountPath: /home/node/.n8n
          name: n8n-claim0
      initContainers:
      - command:
        - sh
        - -c
        - chown 1000:1000 /data
        image: busybox:1.36
        name: volume-permissions
        volumeMounts:
        - mountPath: /data
          name: n8n-claim0
      restartPolicy: Always
      volumes:
      - name: n8n-claim0
        persistentVolumeClaim:
          claimName: n8n-claim0
      - name: n8n-secret
        secret:
          secretName: n8n-secret
      - name: postgres-secret
        secret:
          secretName: postgres-secret
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    service: postgres-n8n
  name: postgres
  namespace: n8n
spec:
  replicas: 1
  selector:
    matchLabels:
      service: postgres-n8n
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
    type: RollingUpdate
  template:
    metadata:
      labels:
        service: postgres-n8n
    spec:
      containers:
      - env:
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              key: POSTGRES_USER
              name: postgres-secret
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              key: POSTGRES_PASSWORD
              name: postgres-secret
        - name: POSTGRES_DB
          value: n8n
        - name: POSTGRES_NON_ROOT_USER
          valueFrom:
            secretKeyRef:
              key: POSTGRES_NON_ROOT_USER
              name: postgres-secret
        - name: POSTGRES_NON_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              key: POSTGRES_NON_ROOT_PASSWORD
              name: postgres-secret
        - name: POSTGRES_HOST
          value: postgres-service
        - name: POSTGRES_PORT
          value: "5432"
        image: postgres:11
        name: postgres
        ports:
        - containerPort: 5432
        resources:
          limits:
            cpu: "4"
            memory: 4Gi
          requests:
            cpu: "1"
            memory: 2Gi
        volumeMounts:
        - mountPath: /var/lib/postgresql/data
          name: postgresql-pv
        - mountPath: /docker-entrypoint-initdb.d/init-n8n-user.sh
          name: init-data
          subPath: init-data.sh
      restartPolicy: Always
      volumes:
      - name: postgresql-pv
        persistentVolumeClaim:
          claimName: postgresql-pv
      - name: postgres-secret
        secret:
          secretName: postgres-secret
      - configMap:
          defaultMode: 484
          name: init-data
        name: init-data
