name: Build Ubuntu 24.04 Vagrant Box

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Vagrant Cloud 버전 (예: 0.0.1)'
        required: true
        default: '0.0.1'
      box_name:
        description: 'Vagrant Cloud Box 이름'
        required: true
        default: 'sysnet4admin/Ubuntu-k8s-2404-test'

env:
  PACKER_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # packer init GitHub API rate limit 방지

jobs:
  build:
    name: Build (x86_64)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # KVM과 VirtualBox는 동시에 하드웨어 가상화를 사용할 수 없으므로 KVM 언로드
      - name: Install VirtualBox
        run: |
          sudo rmmod kvm_amd || sudo rmmod kvm_intel || true
          sudo rmmod kvm || true

          wget -q -O- https://www.virtualbox.org/download/oracle_vbox_2016.asc \
            | sudo gpg --dearmor -o /usr/share/keyrings/oracle-virtualbox-2016.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/oracle-virtualbox-2016.gpg] \
            https://download.virtualbox.org/virtualbox/debian $(lsb_release -cs) contrib" \
            | sudo tee /etc/apt/sources.list.d/virtualbox.list
          sudo apt-get update -y
          sudo apt-get install -y virtualbox-7.1
          sudo modprobe vboxdrv

      - name: Install Vagrant
        run: |
          wget -O- https://apt.releases.hashicorp.com/gpg \
            | sudo gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] \
            https://apt.releases.hashicorp.com $(lsb_release -cs) main" \
            | sudo tee /etc/apt/sources.list.d/hashicorp.list
          sudo apt-get update -y
          sudo apt-get install -y vagrant

      - name: Setup Packer
        uses: hashicorp/setup-packer@main
        with:
          version: latest

      # ISO 캐시: 매 실행마다 1.5GB 다운로드 방지 (7일 유효, 10GB/repo 한도)
      # 캐시 키를 ISO 버전에 고정 → 버전 업 시 키 변경으로 자동 무효화
      - name: Cache Ubuntu ISO
        uses: actions/cache@v4
        with:
          path: bento/bento/builds/iso/
          key: ubuntu-24.04.4-amd64-iso

      - name: Packer Init
        working-directory: bento/bento
        run: packer init packer_templates/

      - name: Build Box
        working-directory: bento/bento
        run: |
          packer build \
            -only=virtualbox-iso.vm \
            -var "iso_url=https://releases.ubuntu.com/noble/ubuntu-24.04.4-live-server-amd64.iso" \
            -var "iso_checksum=file:https://releases.ubuntu.com/noble/SHA256SUMS" \
            -var "ssh_timeout=90m" \
            -var "vbox_boot_wait=60s" \
            -var-file=os_pkrvars/ubuntu/ubuntu-24.04-x86_64.pkrvars.hcl \
            packer_templates/

      # Secrets 설정: HCP_CLIENT_ID, HCP_CLIENT_SECRET (IaC repo Settings > Secrets)
      - name: Get HCP Token
        run: |
          TOKEN=$(curl -sf \
            --request POST \
            --url "https://auth.idp.hashicorp.com/oauth2/token" \
            --header "Content-Type: application/x-www-form-urlencoded" \
            --data "client_id=${{ secrets.HCP_CLIENT_ID }}&client_secret=${{ secrets.HCP_CLIENT_SECRET }}&grant_type=client_credentials&audience=https://api.hashicorp.cloud" \
            | jq -r '.access_token')
          echo "VAGRANT_CLOUD_TOKEN=$TOKEN" >> $GITHUB_ENV

      # --force: 동일 버전 재업로드 허용 / --release: 업로드 후 즉시 릴리스
      - name: Upload to Vagrant Cloud
        working-directory: bento/bento
        run: |
          vagrant cloud publish \
            ${{ github.event.inputs.box_name }} \
            ${{ github.event.inputs.version }} \
            virtualbox \
            builds/ubuntu-24.04-x86_64.virtualbox.box \
            --release \
            --force
