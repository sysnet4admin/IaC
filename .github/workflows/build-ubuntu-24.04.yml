name: Build Ubuntu 24.04 Vagrant Box

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Vagrant Cloud 버전 (예: 0.0.1)'
        required: true
        default: '0.0.1'
      box_name:
        description: 'Vagrant Cloud Box 이름'
        required: true
        default: 'sysnet4admin/Ubuntu-k8s-2404-test'

env:
  PACKER_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # packer init GitHub API rate limit 방지

jobs:
  build:
    name: Build (x86_64)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # QEMU/KVM: GitHub Actions에서 네이티브 지원 (VirtualBox 불필요)
      # VirtualBox는 box 패키징에만 사용하므로 KVM 언로드 불필요
      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y qemu-system-x86 qemu-utils ovmf cpu-checker
          # KVM 접근 권한 확보
          sudo chmod 666 /dev/kvm
          # 진단: KVM 사용 가능 여부 및 QEMU 바이너리 확인
          kvm-ok || true
          which qemu-system-x86_64

      - name: Install Vagrant
        run: |
          wget -O- https://apt.releases.hashicorp.com/gpg \
            | sudo gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] \
            https://apt.releases.hashicorp.com $(lsb_release -cs) main" \
            | sudo tee /etc/apt/sources.list.d/hashicorp.list
          sudo apt-get update -y
          sudo apt-get install -y vagrant

      - name: Install VirtualBox (패키징 전용)
        run: |
          wget -q -O- https://www.virtualbox.org/download/oracle_vbox_2016.asc \
            | sudo gpg --dearmor -o /usr/share/keyrings/oracle-virtualbox-2016.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/oracle-virtualbox-2016.gpg] \
            https://download.virtualbox.org/virtualbox/debian $(lsb_release -cs) contrib" \
            | sudo tee /etc/apt/sources.list.d/virtualbox.list
          sudo apt-get update -y
          sudo apt-get install -y virtualbox-7.1
          sudo modprobe vboxdrv

      - name: Setup Packer
        uses: hashicorp/setup-packer@main
        with:
          version: latest

      # ISO 캐시: 매 실행마다 1.5GB 다운로드 방지 (7일 유효, 10GB/repo 한도)
      - name: Cache Ubuntu ISO
        uses: actions/cache@v4
        with:
          path: bento/builds/iso/
          key: ubuntu-24.04.4-amd64-iso

      - name: Packer Init
        working-directory: bento
        run: packer init ubuntu-24.04-x86_64-qemu.pkr.hcl

      - name: Build Box (QEMU/KVM)
        working-directory: bento
        env:
          PACKER_LOG: 1
        run: |
          packer build \
            -var "iso_url=https://releases.ubuntu.com/noble/ubuntu-24.04.4-live-server-amd64.iso" \
            -var "iso_checksum=file:https://releases.ubuntu.com/noble/SHA256SUMS" \
            -var "ssh_timeout=60m" \
            ubuntu-24.04-x86_64-qemu.pkr.hcl

      # QEMU qcow2 → VirtualBox VMDK 변환 후 Vagrant box 패키징
      - name: Convert to VirtualBox box
        working-directory: bento
        run: |
          # qcow2 → vmdk 변환
          qemu-img convert -f qcow2 -O vmdk \
            builds/ubuntu-24.04-x86_64-qemu/ubuntu-24.04-amd64.qcow2 \
            builds/ubuntu-24.04-amd64.vmdk

          # VirtualBox VM 생성 및 디스크 연결
          VBoxManage createvm --name "ubuntu-24.04-amd64" --ostype Ubuntu_64 --register
          VBoxManage modifyvm "ubuntu-24.04-amd64" \
            --memory 1024 --cpus 1 \
            --nic1 nat \
            --natpf1 "ssh,tcp,,2222,,22"
          VBoxManage storagectl "ubuntu-24.04-amd64" \
            --name "SATA" --add sata --controller IntelAhci
          VBoxManage storageattach "ubuntu-24.04-amd64" \
            --storagectl "SATA" --port 0 --device 0 \
            --type hdd --medium "$(pwd)/builds/ubuntu-24.04-amd64.vmdk"

          # OVA export
          VBoxManage export "ubuntu-24.04-amd64" \
            --output builds/ubuntu-24.04-amd64.ova

          # Vagrant box 패키징
          mkdir -p builds/box_tmp
          cd builds/box_tmp
          tar xf ../ubuntu-24.04-amd64.ova
          cat > Vagrantfile <<'VAGRANTEOF'
          Vagrant.configure("2") do |config|
            config.vm.base_mac = "080027000001"
          end
          VAGRANTEOF
          echo '{"provider":"virtualbox"}' > metadata.json
          tar czf ../ubuntu-24.04-x86_64.virtualbox.box ./*
          cd ../..

      # Secrets 설정: HCP_CLIENT_ID, HCP_CLIENT_SECRET (IaC repo Settings > Secrets)
      - name: Get HCP Token
        run: |
          TOKEN=$(curl -sf \
            --request POST \
            --url "https://auth.idp.hashicorp.com/oauth2/token" \
            --header "Content-Type: application/x-www-form-urlencoded" \
            --data "client_id=${{ secrets.HCP_CLIENT_ID }}&client_secret=${{ secrets.HCP_CLIENT_SECRET }}&grant_type=client_credentials&audience=https://api.hashicorp.cloud" \
            | jq -r '.access_token')
          echo "VAGRANT_CLOUD_TOKEN=$TOKEN" >> $GITHUB_ENV

      # --force: 동일 버전 재업로드 허용 / --release: 업로드 후 즉시 릴리스
      - name: Upload to Vagrant Cloud
        working-directory: bento
        run: |
          vagrant cloud publish \
            ${{ github.event.inputs.box_name }} \
            ${{ github.event.inputs.version }} \
            virtualbox \
            builds/ubuntu-24.04-x86_64.virtualbox.box \
            --release \
            --force
