name: Build Ubuntu 24.04 Vagrant Box

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Vagrant Cloud 버전 (예: 0.0.1)'
        required: true
        default: '0.0.1'
      box_name:
        description: 'Vagrant Cloud Box 이름'
        required: true
        default: 'sysnet4admin/Ubuntu-k8s-2404-test'

env:
  PACKER_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # packer init GitHub API rate limit 방지
  VIRTUALBOX_VERSION: "7.1.6"
  VIRTUALBOX_BUILD: "168469"

jobs:
  build:
    name: Build (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
            iso_url: "https://releases.ubuntu.com/noble/ubuntu-24.04.4-live-server-amd64.iso"
            iso_checksum: "file:https://releases.ubuntu.com/noble/SHA256SUMS"
            vbox_pkg: "virtualbox-7.1"          # Debian repo 설치
            vbox_deb: ""

          - arch: aarch64
            runner: ubuntu-24.04-arm
            iso_url: "https://cdimage.ubuntu.com/releases/24.04/release/ubuntu-24.04.4-live-server-arm64.iso"
            iso_checksum: "sha256:9a6ce6d7e66c8abed24d24944570a495caca80b3b0007df02818e13829f27f32"
            vbox_pkg: ""                         # Debian repo에 arm64 패키지 없음
            vbox_deb: "virtualbox-7.1_7.1.6-168469~Ubuntu~noble_arm64.deb"  # 직접 다운로드

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── x86_64: VirtualBox Debian repo 설치 ──────────────────────────────
      - name: Install VirtualBox (x86_64 via apt)
        if: matrix.arch == 'x86_64'
        run: |
          # KVM과 VirtualBox는 동시에 하드웨어 가상화를 사용할 수 없으므로 KVM 언로드
          sudo rmmod kvm_amd || sudo rmmod kvm_intel || true
          sudo rmmod kvm || true

          wget -q -O- https://www.virtualbox.org/download/oracle_vbox_2016.asc \
            | sudo gpg --dearmor -o /usr/share/keyrings/oracle-virtualbox-2016.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/oracle-virtualbox-2016.gpg] \
            https://download.virtualbox.org/virtualbox/debian $(lsb_release -cs) contrib" \
            | sudo tee /etc/apt/sources.list.d/virtualbox.list
          sudo apt-get update -y
          sudo apt-get install -y virtualbox-7.1
          sudo modprobe vboxdrv

      # ── aarch64: VirtualBox .deb 직접 다운로드 설치 ───────────────────────
      - name: Install VirtualBox (aarch64 via deb)
        if: matrix.arch == 'aarch64'
        run: |
          # arm64 Linux용 VirtualBox는 Debian repo 미제공 → 직접 다운로드
          wget -q "https://download.virtualbox.org/virtualbox/${{ env.VIRTUALBOX_VERSION }}/${{ matrix.vbox_deb }}" \
            -O /tmp/virtualbox.deb
          sudo apt-get install -y /tmp/virtualbox.deb
          sudo modprobe vboxdrv

      # ── 공통: Vagrant 설치 (HCP 업로드용) ────────────────────────────────
      - name: Install Vagrant
        run: |
          wget -O- https://apt.releases.hashicorp.com/gpg \
            | sudo gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] \
            https://apt.releases.hashicorp.com $(lsb_release -cs) main" \
            | sudo tee /etc/apt/sources.list.d/hashicorp.list
          sudo apt-get update -y
          sudo apt-get install -y vagrant

      # ── 공통: Packer 설치 ────────────────────────────────────────────────
      - name: Setup Packer
        uses: hashicorp/setup-packer@main
        with:
          version: latest

      # ── 공통: Packer 플러그인 초기화 ──────────────────────────────────────
      - name: Packer Init
        working-directory: bento/bento
        run: packer init packer_templates/

      # ── 공통: VirtualBox 박스 빌드 ────────────────────────────────────────
      # iso_url / iso_checksum을 matrix에서 override (aarch64 pkrvars는 로컬 경로이므로)
      - name: Build Box
        working-directory: bento/bento
        run: |
          packer build \
            -only=virtualbox-iso.vm \
            -var "iso_url=${{ matrix.iso_url }}" \
            -var "iso_checksum=${{ matrix.iso_checksum }}" \
            -var-file=os_pkrvars/ubuntu/ubuntu-24.04-${{ matrix.arch }}.pkrvars.hcl \
            packer_templates/

      # ── 공통: HCP Service Principal → Vagrant Cloud 토큰 획득 ─────────────
      # Secrets 설정: HCP_CLIENT_ID, HCP_CLIENT_SECRET (IaC repo Settings > Secrets)
      - name: Get HCP Token
        run: |
          TOKEN=$(curl -sf \
            --request POST \
            --url "https://auth.idp.hashicorp.com/oauth2/token" \
            --header "Content-Type: application/x-www-form-urlencoded" \
            --data "client_id=${{ secrets.HCP_CLIENT_ID }}&client_secret=${{ secrets.HCP_CLIENT_SECRET }}&grant_type=client_credentials&audience=https://api.hashicorp.cloud" \
            | jq -r '.access_token')
          echo "VAGRANT_CLOUD_TOKEN=$TOKEN" >> $GITHUB_ENV

      # ── 공통: Vagrant Cloud(HCP) 업로드 ───────────────────────────────────
      # --force: 동일 버전 재업로드 허용 / --release: 업로드 후 즉시 릴리스
      - name: Upload to Vagrant Cloud
        working-directory: bento/bento
        run: |
          vagrant cloud publish \
            ${{ github.event.inputs.box_name }} \
            ${{ github.event.inputs.version }} \
            virtualbox \
            builds/ubuntu-24.04-${{ matrix.arch }}.virtualbox.box \
            --release \
            --force
